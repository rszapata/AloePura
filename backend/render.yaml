services:
  - type: web
    name: aloe-ecommerce-backend
    env: node
    plan: free
    region: frankfurt
    rootDir: backend
    buildCommand: npm install && npm run migrate && npm run seed
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: DATABASE_URL
        fromDatabase:
          name: aloe-ecommerce-db
          property: connectionString
      - key: CORS_ORIGINS
        sync: false
      - key: AUTH_RATE_LIMIT_MAX
        value: 10
      - key: AUTH_RATE_LIMIT_WINDOW_MS
        value: 900000

databases:
  - name: aloe-ecommerce-db
    plan: free
    region: frankfurt
    postgresMajorVersion: 16
